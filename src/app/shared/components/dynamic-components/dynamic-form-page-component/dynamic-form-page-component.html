<div class="erp-page-wrapper">
  <div class="erp-header-card">
    <div class="right-section">
      <h2 class="page-title">{{ actionKey | translate }} {{ title | translate }}</h2>
    </div>
  </div>

  <div class="erp-content-card">
    <form [formGroup]="form" (ngSubmit)="onClickSave()">
      <div class="form-body p-4">
        <div class="row g-4">
          @for (config of controls; track config.fieldName) {
            <div class="filter-row">
              <app-dynamic-input-component [config]="config" [form]="form">
              </app-dynamic-input-component>
            </div>
          }
        </div>
      </div>

      @if (hasTabs) {
        <div class="custom-tabs-wrapper">
          <ul class="nav nav-tabs border-bottom px-4">
            @for (tabName of tabs; track $index) {
              <li class="nav-item">
                <button
                  type="button"
                  class="nav-link custom-tab-btn"
                  [class.active]="activeTab === $index"
                  (click)="selectTab($index)"
                >
                  {{ tabName | translate }}
                </button>
              </li>
            }
          </ul>

          <div class="tab-content-area p-4">
            <ng-content></ng-content>
          </div>
        </div>
      }

      <div class="form-footer-actions p-4">
        <div class="action-buttons-group">
          <button type="submit" class="erp-btn btn-save" [disabled]="form.invalid || isLoading">
            {{ 'save' | translate }}
          </button>

          <button
            type="button"
            class="erp-btn btn-save-new"
            (click)="onClickSaveAndNew()"
            [disabled]="form.invalid || isLoading"
          >
            {{ 'saveAndAddNew' | translate }}
          </button>
          @if (isEdit) {
            <button type="button" class="erp-btn btn-delete" (click)="onClickDelete()">
              {{ 'delete' | translate }}
            </button>

            <button type="button" class="erp-btn btn-copy" (click)="onClickCopy()">
              {{ 'copy' | translate }}
            </button>
          }
          <button type="button" class="erp-btn btn-back" (click)="onClickCancel()">
            <i class="fas fa-arrow-left me-2"></i> {{ 'back' | translate }}
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

@if (showConfirmDialog) {
  <app-confirm-dialog-component
    [title]="'deleteTitle'"
    [message]="'deleteConfirmMessage' | translate: { name: (title | translate) }"
    (result)="handleDialogResult($event)"
  >
  </app-confirm-dialog-component>
}
