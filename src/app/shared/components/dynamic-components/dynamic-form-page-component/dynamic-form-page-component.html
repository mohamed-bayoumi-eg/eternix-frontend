<div class="erp-page-wrapper">
  <div class="erp-content-card">
    <form [formGroup]="form" (ngSubmit)="handleSave()">
      <div class="form-body p-4">
        <div class="row g-4">
          @for (ctrl of controls; track $index) {
            <div class="filter-row">
              <app-dynamic-input-component
                [config]="ctrl"
                [form]="form"
                (valueChange)="onValueChange.emit($event)"
              >
              </app-dynamic-input-component>
            </div>
          }
        </div>
      </div>

      @if (hasTabs) {
        <div class="custom-tabs-wrapper">
          <ul class="nav nav-tabs border-bottom px-4">
            @for (tabName of tabs; track $index) {
              <li class="nav-item">
                <button
                  type="button"
                  class="nav-link custom-tab-btn"
                  [class.active]="activeTab === $index"
                  (click)="activeTab = $index"
                >
                  {{ tabName | translate }}
                </button>
              </li>
            }
          </ul>

          <div class="tab-content-area p-4">
            <ng-content></ng-content>
          </div>
        </div>
      }

      <div class="form-footer-actions p-4">
        <div class="action-buttons-group d-flex gap-2">
          @if (config.showSaveBtn) {
            <button
              type="submit"
              class="erp-btn btn-save"
              [disabled]="form.invalid || !isExtraDataValid || isLoading"
            >
              <i class="fas fa-save me-1"></i> {{ 'save' | translate }}
            </button>
          }

          @if (config.showSaveAndNewBtn) {
            <button
              type="button"
              class="erp-btn btn-save-new"
              (click)="handleSave(true)"
              [disabled]="form.invalid || !isExtraDataValid || isLoading"
            >
              {{ 'saveAndAddNew' | translate }}
            </button>
          }

          @if (isEdit) {
            @if (config.showDeleteBtn) {
              <button type="button" class="erp-btn btn-delete" (click)="showConfirmDialog = true">
                <i class="fas fa-trash me-1"></i> {{ 'delete' | translate }}
              </button>
            }
            @if (config.showCopyBtn) {
              <button type="button" class="erp-btn btn-copy" (click)="onCopy.emit()">
                <i class="fas fa-copy me-1"></i> {{ 'copy' | translate }}
              </button>
            }
          }

          <div class="ms-auto">
            <button type="button" class="erp-btn btn-back" (click)="onCancel.emit()">
              <i class="fas fa-times me-1"></i> {{ 'cancel' | translate }}
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

@if (showConfirmDialog) {
  <app-confirm-dialog-component
    [title]="'deleteTitle'"
    [message]="'deleteConfirmMessage' | translate: { name: (config.title | translate) }"
    (result)="handleDialogResult($event)"
  >
  </app-confirm-dialog-component>
}
