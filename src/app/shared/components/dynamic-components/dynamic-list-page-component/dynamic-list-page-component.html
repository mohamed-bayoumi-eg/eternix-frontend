<div class="erp-page-wrapper">
  <div class="erp-header-card">
    <div class="right-section">
      <div class="search-filters-column">
        @if (config.showSearch) {
          <div class="filter-row search-filter-field">
            <app-dynamic-input-component
              [config]="searchConfig"
              [form]="filterForm"
              [showLabel]="true"
            >
            </app-dynamic-input-component>
          </div>
        }

        @for (fConfig of filterConfigs; track $index) {
          <div class="filter-row">
            <app-dynamic-input-component [config]="fConfig" [form]="filterForm">
            </app-dynamic-input-component>
          </div>
        }
      </div>
    </div>

    <div class="left-actions">
      @if (config.showAddBtn) {
        <button class="erp-btn btn-add" (click)="onAdd.emit()">
          <i class="fas fa-plus mr-2"></i>
          <span>{{ 'addNew' | translate }}</span>
        </button>
      }
    </div>
  </div>

  <div class="erp-content-card">
    <app-dynamic-table-component
      [columns]="columns"
      [items]="items"
      [metaData]="metaData"
      [isLoading]="isLoading"
      [sortField]="query?.sortField"
      [sortType]="query?.sortType"
      [showEdit]="!!config.showEditBtn"
      [showDelete]="!!config.showDeleteBtn"
      (sortChange)="onSort.emit($event)"
      (pageChange)="onPageChange.emit($event)"
      (editAction)="onEdit.emit($event)"
      (deleteAction)="handleDeleteClick($event)"
      (pageSizeChange)="onPageSizeChange.emit($event)"
      (selectionChange)="selectedIds = $event"
      (onBulkDelete)="handleBulkDelete($event)"
    >
    </app-dynamic-table-component>
  </div>
</div>

@if (showConfirmDialog) {
  <app-confirm-dialog-component
    [title]="'deleteTitle'"
    [message]="'deleteConfirmMessage' | translate: { name: (config.title | translate) }"
    (result)="handleDialogResult($event)"
  >
  </app-confirm-dialog-component>
}

@if (showBulkConfirm) {
  <app-confirm-dialog-component
    [title]="'deleteBulkTitle' | translate"
    [message]="'deleteBulkConfirmMessage' | translate: { count: selectedIds.length }"
    (result)="handleBulkResult($event)"
  >
  </app-confirm-dialog-component>
}
