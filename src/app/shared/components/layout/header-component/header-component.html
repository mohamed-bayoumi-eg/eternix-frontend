<header class="main-header">
  <div class="header-left">
    <div class="logo" [routerLink]="'/'">{{ 'appName' | translate }}</div>
    <button class="toggle-sidebar" (click)="onToggleSidebar()">☰</button>
  </div>

  <div class="header-center">
    <div class="theme-circle theme-1" (click)="onThemeSelect('first-theme')"></div>
    <div class="theme-circle theme-2" (click)="onThemeSelect('second-theme')"></div>
    <div class="theme-circle theme-3" (click)="onThemeSelect('third-theme')"></div>
  </div>

  <div class="header-right">
    <button class="lang-toggle" (click)="onToggleLanguage()">
      {{ currentLang === 'en' ? 'AR' : 'EN' }}
    </button>

    @if (authService.token()) {
      <div class="user-dropdown-container">
        <div
          class="user-trigger"
          (click)="toggleUserMenu($event)"
          [class.active]="isUserMenuOpen()"
        >
          <div class="user-avatar">
            {{ authService.userName()?.charAt(0)?.toUpperCase() || 'U' }}
          </div>
          <span class="username">{{ authService.userName() }}</span>
          <i class="chevron-icon">▼</i>
        </div>

        @if (isUserMenuOpen()) {
          <ul class="dropdown-menu">
            <li [routerLink]="['/profile']"> {{ 'profile' | translate }}</li>
            <li [routerLink]="['/settings']">
              {{ 'settings' | translate }}
            </li>
            <hr />
            <li class="logout-item" (click)="onLogout()">
              {{ 'logout' | translate }}
            </li>
          </ul>
        }
      </div>
    } @else {
      <button class="btn login-btn" [routerLink]="['/login']">
        {{ 'login' | translate }}
      </button>
    }
  </div>
</header>
